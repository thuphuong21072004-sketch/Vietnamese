<div class="wrapper" *ngIf="!isDetail">

    <div class="top-bar">
        <div>
            <h2 class="title">Placement Tests</h2>
            <p class="subtitle">Manage your placement test assessments</p>
        </div>
        <button class="btn-primary" (click)="openAdd()">
            + Create Placement
        </button>
    </div>

    <div class="info-box" *ngIf="placements.length > 0">
        <span class="badge">Total: {{ placements.length }}</span>
    </div>

    <div class="table-container" *ngIf="placements.length > 0">

        <div class="table-header">
            <div>Name</div>
            <div>Description</div>
            <div class="center">Action</div>
        </div>

        <div class="table-row" *ngFor="let p of placements; trackBy: trackById">
            <div class="cell">
                <input class="input" [value]="p.name" readonly />
            </div>
            <div class="cell">
                <input class="input" [value]="p.description || '(No description)'" readonly />
            </div>
            <div class="cell center">
                <button class="btn-manage" (click)="openEdit(p)">
                    Manage
                </button>
            </div>
        </div>
    </div>

    <div class="empty-state" *ngIf="placements.length === 0">
        <p>No placement tests yet. Create your first one!</p>
    </div>

</div>

<div *ngIf="isDetail" class="detail-container">

    <div class="detail-header">
        <div>
            <h2>
                {{ form.placementId ? 'Edit Placement Test' : 'Create Placement Test' }}
            </h2>
            <p class="form-subtitle" *ngIf="form.placementId">ID: {{ form.placementId }}</p>
        </div>
        <button class="btn-back" (click)="goList()">
            ← Back to List
        </button>
    </div>

    <div class="form-section">
        <h3 class="section-title">Test Details</h3>

        <div class="form-group">
            <label>
                Test Name <span class="required">*</span>
            </label>
            <input [(ngModel)]="form.name" name="name" placeholder="Enter placement test name..." />
        </div>

        <div class="form-group">
            <label>
                Description
            </label>
            <textarea [(ngModel)]="form.description" name="description" placeholder="Enter description or instructions for students..."></textarea>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-save" (click)="save()">
            💾 Save Placement
        </button>
        <button *ngIf="form.placementId" class="btn-quiz" (click)="toggleQuiz()">
            {{ showQuiz ? '✓ Hide Quiz' : '+ Manage Quiz' }}
        </button>
        <button *ngIf="form.placementId" class="btn-delete" (click)="delete(form.placementId)">
            🗑️ Delete
        </button>
    </div>

    <div *ngIf="showQuiz" class="quiz-wrapper">
        <app-quiz [refId]="form.placementId" [refType]="'PLACEMENT'"></app-quiz>
    </div>

</div>
