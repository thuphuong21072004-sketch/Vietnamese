<div class="wrapper" *ngIf="!isDetail">

    <div class="top-bar">

        <h2 class="title">
            Placement Tests
        </h2>

        <button class="btn-add" (click)="openAdd()">
            + Add Placement
        </button>

    </div>

    <div class="table-container">

        <div class="table-header">

            <div>Name</div>

            <div>Description</div>

            <div class="center">Action</div>

        </div>

        <div class="table-row" *ngFor="let p of placements; trackBy: trackById">

            <div class="cell">

                <input class="input" [value]="p.name" readonly />

            </div>

            <div class="cell">

                <input class="input" [value]="p.description || ''" readonly />

            </div>

            <div class="cell center">

                <button class="btn-view" (click)="openEdit(p)">

                    Manage

                </button>

            </div>

        </div>

    </div>

</div>

<div *ngIf="isDetail" class="detail-container">

    <div class="detail-header">

        <h2>
            {{ form.placementId ? 'Edit Placement Test' : 'Add Placement Test' }}
        </h2>

        <button class="btn-back" (click)="goList()">

            Back

        </button>

    </div>

    <div class="form-group">

        <label>
            Placement Name
        </label>

        <input [(ngModel)]="form.name" name="name" placeholder="Enter placement name..." />

    </div>

    <div class="form-group">

        <label>
            Description
        </label>

        <textarea [(ngModel)]="form.description" name="description" placeholder="Enter description...">
        </textarea>

    </div>

    <div class="actions">

        <button class="btn-save" (click)="save()">

            Save Placement

        </button>
        <button *ngIf="form.placementId" class="btn-delete" (click)="delete(form.placementId)">
        
            Delete Placement
        
        </button>

        <button *ngIf="form.placementId" class="btn-manage" (click)="toggleQuiz()">

            {{ showQuiz ? 'Hide Quiz' : 'Manage Quiz' }}

        </button>

    </div>

    <div *ngIf="showQuiz" class="quiz-wrapper">

        <app-quiz [refId]="form.placementId" [refType]="'PLACEMENT'">
        </app-quiz>

    </div>

</div>
