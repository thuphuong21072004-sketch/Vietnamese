<div class="level-container">

    <h3>Level Management</h3>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Active</th>
                <th>Delete</th>
                <th>Select</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let level of levels" [ngClass]="{ 'deleted-row': level.isDelete }">
                <td>
                    <input [(ngModel)]="level.levelName" [disabled]="level.isDelete" />
                </td>      
                <td>
                    <input [(ngModel)]="level.description" [disabled]="level.isDelete" />
                </td>
                <td>
                    <input type="checkbox" [(ngModel)]="level.isActive" />
                </td>
                <td>
                    <input type="checkbox" [(ngModel)]="level.isDelete" />
                </td>
                <td>
                    <a [routerLink]="['/admin/courses']" [queryParams]="{ levelId: level.levelId }">
                        ➡
                    </a>
                </td>
            </tr>

        </tbody>
    </table>

    <div class="button-row">
        <button (click)="addRow()">Add new row</button>
        <button class="save-btn" (click)="saveAll()">Save All</button>
    </div>
</div>
