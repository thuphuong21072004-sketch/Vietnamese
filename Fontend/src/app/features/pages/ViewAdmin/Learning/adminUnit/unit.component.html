<div class="unit-container">

    <div class="course-info" *ngIf="course as c">
        <h2>{{ c.courseName }}</h2>
        <p>{{ c.description }}</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Created By</th>
                <th>Created Date</th>
                <th>Active</th>
                <th>Delete</th>
                <th>Select</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let unit of units; trackBy: trackById" [ngClass]="{ 'deleted-row': unit.isDelete }">

                <td> {{unit.unitName}}</td>
                <td>{{unit.description}}</td>
                <td>{{unit.createdBy}}</td>
                <td>{{unit.createdDate}}</td>
                <td>{{unit.isActive}}</td>
                <td><input type="checkbox" [(ngModel)]="unit.isDelete" /></td>
                <td><a [routerLink]="['/admin/unitDetail']" [queryParams]="{ unitId: unit.unitId }">➡</a></td>
            </tr>

        </tbody>
    </table>
    <div class="button-row">
        <button [routerLink]="['/admin/unitDetail']" [queryParams]="{ courseId: courseId }">
             Add unit
        </button>

        <button class="delete-btn" (click)="deleteSelected()">
            Delete Selected
        </button>

        <button class="btn-primary" [disabled]="courseId === 0" (click)="showCourseQuiz = !showCourseQuiz">
            {{ showCourseQuiz ? 'Hide Course Quiz' : 'Manage Course Quiz' }}
        </button>
    </div>
    <app-quiz *ngIf="showCourseQuiz && courseId > 0" [refId]="courseId" [refType]="'COURSE_JUMP'">
    </app-quiz>
</div>
