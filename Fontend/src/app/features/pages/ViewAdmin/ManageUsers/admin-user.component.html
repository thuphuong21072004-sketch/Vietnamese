<div class="admin-page">

    <div class="admin-card">

        <div class="header">

            <div>
                <h2>
                    User Management
                </h2>

                <p>
                    Manage all users in the Vietnamese learning system
                </p>
            </div>

        </div>

        <div class="filter-section">

            <div class="form-group">

                <label>
                    Search Email
                </label>

                <input type="text" placeholder="Enter email..." [(ngModel)]="email" />

            </div>

            <div class="form-group">

                <label>
                    Status
                </label>

                <select [(ngModel)]="status">

                    <option [ngValue]="null">
                        All
                    </option>

                    <option [ngValue]="1">
                        Active
                    </option>

                    <option [ngValue]="0">
                        Inactive
                    </option>

                </select>

            </div>

            <button class="search-btn" (click)="search()">
                Search
            </button>

        </div>

        <div class="loading" *ngIf="loading">
            Loading users...
        </div>

        <div class="table-wrapper" *ngIf="!loading">

            <table>

                <thead>

                    <tr>

                        <th>
                            #
                        </th>

                        <th>
                            Name
                        </th>

                        <th>
                            Email
                        </th>

                        <th>
                            Country
                        </th>

                        <th>
                            Bio
                        </th>

                        <th>
                            Status
                        </th>

                        <th>
                            Role
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="
                            let u of users;
                            let i = index
                        ">

                        <td>
                            {{
                            (page - 1)
                            * pageSize
                            + i + 1
                            }}
                        </td>

                        <td>
                            {{u.name}}
                        </td>

                        <td class="email">
                            {{u.email}}
                        </td>

                        <td>
                            {{
                            u.country ||
                            'N/A'
                            }}
                        </td>

                        <td class="bio">
                            {{
                            u.bio ||
                            'No bio'
                            }}
                        </td>

                        <td>

                            <select [(ngModel)]="u.status">

                                <option [ngValue]="1">
                                    Active
                                </option>

                                <option [ngValue]="0">
                                    Inactive
                                </option>

                            </select>

                        </td>

                        <td>

                            <select [(ngModel)]="u.roleName">

                                <option value="Admin">
                                    Admin
                                </option>

                                <option value="User">
                                    User
                                </option>

                                <option value="Moderator">
                                    Moderator
                                </option>

                            </select>

                        </td>

                        <td>

                            <button class="save-btn" (click)="saveUser(u)">
                                Save
                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <div class="pagination">

            <button (click)="prevPage()" [disabled]="page <= 1">
                Prev
            </button>

            <span>
                Page {{page}}
                /
                {{totalPage}}
            </span>

            <button (click)="nextPage()" [disabled]="page >= totalPage">
                Next
            </button>

        </div>

    </div>

</div>
