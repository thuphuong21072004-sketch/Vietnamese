<div class="profile-page">

    <div class="profile-card">

        <div class="avatar-wrapper">

            <img *ngIf="avatarUrl" [src]="avatarUrl" class="avatar" />

            <div *ngIf="!avatarUrl" class="avatar-empty">
                No Avatar
            </div>

        </div>

        <div class="profile-table">

            <div class="profile-row">
                <span class="label">
                    Name
                </span>

                <span class="value">
                    {{ name }}
                </span>
            </div>

            <div class="profile-row">
                <span class="label">
                    Email
                </span>

                <span class="value">
                    {{ email }}
                </span>
            </div>

            <div class="profile-row">
                <span class="label">
                    Role
                </span>

                <span class="value role">
                    {{ roleName }}
                </span>
            </div>

            <div class="profile-row">
                <span class="label">
                    Status
                </span>

                <span class="value">
                    {{ status }}
                </span>
            </div>

            <div class="profile-row">
                <span class="label">
                    Country
                </span>

                <span class="value">
                    {{ country || 'N/A' }}
                </span>
            </div>

            <div class="profile-row bio-row">
                <span class="label">
                    Bio
                </span>

                <span class="value">
                    {{ bio || 'No bio yet' }}
                </span>
            </div>

        </div>

        <div class="section">

            <h3>
                Update Information
            </h3>

            <div class="form-group">
                <label>
                    Full Name
                </label>

                <input type="text" [(ngModel)]="newName" />
            </div>

            <div class="form-group">
                <label>
                    Email
                </label>

                <input type="text" [(ngModel)]="newEmail" />
            </div>

            <div class="form-group">
                <label>
                    Country
                </label>

                <input type="text" [(ngModel)]="newCountry" />
            </div>

            <div class="form-group">
                <label>
                    Bio
                </label>

                <textarea rows="4" [(ngModel)]="newBio"></textarea>
            </div>

            <div class="form-group">
            
                <label>
                    Avatar
                </label>
            
                <input type="file" accept="image/*" (change)="onFileSelected($event)" />
            
            </div>

            <button class="primary-btn" (click)="updateProfile()">
                Update Profile
            </button>

        </div>

        <div class="section">

            <h3>
                Change Password
            </h3>

            <div class="form-group">
                <label>
                    Old Password
                </label>

                <input type="password" [(ngModel)]="oldPassword" />
            </div>

            <div class="form-group">
                <label>
                    New Password
                </label>

                <input type="password" [(ngModel)]="newPassword" />
            </div>

            <button class="primary-btn" (click)="changePassword()">
                Change Password
            </button>

        </div>

    </div>

</div>
