<div class="placement-page">
    <div class="page-header">
        <p class="eyebrow">Practice</p>
        <h1>Placement Tests</h1>
        <p>Find the right level before starting your learning path.</p>
    </div>

    <div *ngIf="loading" class="loading">Loading tests...</div>

    <div *ngIf="!loading" class="placement-grid">
        <div class="placement-card random-card" (click)="openRandom()">
            <div class="placement-number">Mix</div>
            <h2>Random Test</h2>
            <p>Start a quick placement test selected for you.</p>
            <span class="card-action">Start now</span>
        </div>

        <div *ngFor="let p of placements; let i = index" class="placement-card">
            <div class="placement-number">{{ i + 1 }}</div>
            <h2>{{ p.name }}</h2>
            <p>{{ p.description || 'Placement Test' }}</p>
            <button class="start-btn" (click)="openPlacement(p)">Start Test</button>
        </div>
    </div>
</div>
