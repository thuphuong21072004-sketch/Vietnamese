<div *ngIf="!selectedUnit" class="duo-container">

    <div class="duo-header">

        <h1>
            {{ currentLevel?.levelName }}
        </h1>

        <p>
            {{ currentLevel?.description }}
        </p>

    </div>

    <div *ngIf="loading" class="loading">

        Loading your progress...

    </div>

    <ng-container *ngFor="
            let course of currentLevel?.courses;
            let cIndex = index
        ">

        <div class="duo-course">

            <div class="duo-course-sticky">
            
                {{ course.courseName }}
            
            </div>

            <div class="duo-path">

                <ng-container *ngFor="
                        let unit of course.units;
                        let i = index
                    ">

                    <div #unitNode class="duo-node-wrapper" [ngClass]="{
                            'left': i % 2 === 0,
                            'right': i % 2 !== 0
                        }">

                        <button class="duo-node" [ngClass]="getunitState(unit)" (click)="openUnit(unit)">

                            <span *ngIf="
                                    getunitState(unit)
                                    === 'done'
                                ">

                                ✓

                            </span>

                            <span *ngIf="
                                    getunitState(unit)
                                    === 'current'
                                ">

                                ▶

                            </span>

                            <span *ngIf="
                                    getunitState(unit)
                                    === 'locked'
                                ">

                                🔒

                            </span>

                        </button>

                        <div class="duo-label">

                            {{ unit.unitName }}

                        </div>

                    </div>

                </ng-container>

                <div *ngIf="
                        cIndex !==
                        currentLevel?.courses.length - 1
                    " class="duo-node-wrapper center">

                    <button class="duo-node course-test" [disabled]="
                            getCourseState(course)
                            === 'locked'
                        " (click)="openCourseQuiz(course)">

                        ★

                    </button>

                    <div class="duo-label">

                        Skip Course Test

                    </div>

                </div>

            </div>

        </div>

    </ng-container>

    <div class="level-test-section">

        <button class="level-test-btn" [disabled]="
                getLevelState(currentLevel)
                === 'locked'
            " (click)="openLevelQuiz(currentLevel)">

            🏆 Skip Level Test

        </button>

    </div>

</div>

<div *ngIf="selectedUnit" class="progress-container">

    <div class="lesson-page">

        <button class="back-btn" (click)="selectedUnit = null">

            ← Back

        </button>

        <div class="unit-info">

            <p class="eyebrow">

                Current lesson

            </p>

            <h1>

                {{ selectedUnit.unitName }}

            </h1>

            <div class="info-grid">

                <div class="objective">

                    <strong>

                        Objective

                    </strong>

                    <span>

                        {{ selectedUnit.objective }}

                    </span>

                </div>

                <div class="description">

                    <strong>

                        Description

                    </strong>

                    <span>

                        {{ selectedUnit.description }}

                    </span>

                </div>

            </div>

        </div>

        <video *ngIf="selectedUnit?.videoUrl" controls>

            <source [src]="
                    'http://localhost:5108/videos/'
                    + selectedUnit.videoUrl
                " type="video/mp4">

        </video>

        <div class="lesson-actions">

            <button class="quiz-btn start-btn" (click)="router.navigate(
                    ['/user/quiz'],
                    {
                        queryParams: {
                            unitId: selectedUnit.unitId,
                            refType: refType,
                            refId: refId
                        }
                    })">

                Start Test

            </button>

        </div>

    </div>

</div>
